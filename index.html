<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF SENSEI - ELITE CONFIG GENERATOR V2.0</title>
    <style>
        :root {
            --bg-light: #ffffff;
            --card-white: #f8fafc;
            --accent-red: #ff2a5f;
            --border-color: #cbd5e1;
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 440px;
            border: 2px solid var(--accent-red);
            background-color: var(--card-white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(255, 42, 95, 0.1);
            box-sizing: border-box;
        }
        .main-title {
            text-align: center;
            font-size: 34px;
            font-weight: 900;
            color: var(--text-dark);
            letter-spacing: 2px;
            margin: 0;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }
        .sub-title {
            text-align: center;
            font-size: 11px;
            color: var(--accent-red);
            letter-spacing: 2px;
            margin: 5px 0 25px 0;
            font-weight: bold;
            text-transform: uppercase;
        }
        .input-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .field-group {
            margin-bottom: 18px;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #f1f5f9;
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 15px;
            box-sizing: border-box;
            border-radius: 6px;
        }
        /* Mobile-proof selector system using hidden radios */
        .selector-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .dpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 25px;
        }
        .selector-grid label, .dpi-grid label {
            display: block;
            background-color: #f1f5f9;
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            padding: 12px 5px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }
        .selector-grid input[type="radio"], .dpi-grid input[type="radio"] {
            display: none;
        }
        /* Visual active states triggered natively by browser mechanics */
        .selector-grid input[type="radio"]:checked + label,
        .dpi-grid input[type="radio"]:checked + label {
            background-color: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 42, 95, 0.25);
        }
        .btn-action-trigger {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
            transition: background-color 0.2s;
        }
        .btn-action-trigger:active {
            background: var(--accent-red);
        }
        .output-panel {
            border: 2px dashed var(--accent-red);
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            display: none;
            white-space: pre-line;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-dark);
        }
        .output-panel.visible {
            display: block;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-title">FF SENSEI</div>
    <div class="sub-title">ELITE CONFIG GENERATOR V2.0</div>

    <div class="field-group">
        <label class="input-label">Select Brand</label>
        <select id="brandSelect">
            <option value="Samsung">Samsung</option>
            <option value="Apple">Apple / iPhone</option>
            <option value="Xiaomi">Xiaomi / Poco / Redmi</option>
            <option value="Infinix">Infinix</option>
            <option value="Tecno">Tecno</option>
            <option value="Other">Other Brand</option>
        </select>
    </div>

    <div class="field-group">
        <label class="input-label">Enter Model</label>
        <input type="text" id="modelInput" placeholder="e.g., A05, S24, Poco X6...">
    </div>

    <label class="input-label">Sight Calibration</label>
    <div class="selector-grid">
        <div>
            <input type="radio" name="rangeGroup" id="range-high" value="HIGH" checked>
            <label for="range-high">Alta</label>
        </div>
        <div>
            <input type="radio" name="rangeGroup" id="range-medium" value="MEDIUM">
            <label for="range-medium">Media</label>
        </div>
        <div>
            <input type="radio" name="rangeGroup" id="range-low" value="LOW">
            <label for="range-low">Baja</label>
        </div>
    </div>

    <label class="input-label">DPI Profiler</label>
    <div class="dpi-grid">
        <div>
            <input type="radio" name="dpiGroup" id="dpi-con" value="CON DPI" checked>
            <label for="dpi-con">Con DPI</label>
        </div>
        <div>
            <input type="radio" name="dpiGroup" id="dpi-sin" value="SIN DPI">
            <label for="dpi-sin">Sin DPI</label>
        </div>
    </div>

    <button type="button" class="btn-action-trigger" onclick="processAiCalibration()">Generate AI Config</button>

    <div class="output-panel" id="outputPanel"></div>
</div>

<script>
function processAiCalibration() {
    const brand = document.getElementById('brandSelect').value;
    const model = document.getElementById('modelInput').value.trim().toUpperCase() || "DEVICE";
    
    // Natively fetch value parameters from active options box
    const activeRange = document.querySelector('input[name="rangeGroup"]:checked').value;
    const activeDpiMode = document.querySelector('input[name="dpiGroup"]:checked').value;

    // AI Math Blueprint formulas matching SystemWoods target physics
    let general = 98, redDot = 85, scope2x = 90, scope4x = 88, buttonSize = 46, finalDpi = "Standard";

    if (activeRange === 'HIGH') {
        general = 193; redDot = 63; scope2x = 126; scope4x = 121; buttonSize = 44;
    } else if (activeRange === 'MEDIUM') {
        general = 175; redDot = 72; scope2x = 114; scope4x = 108; buttonSize = 47;
    } else if (activeRange === 'LOW') {
        general = 148; redDot = 80; scope2x = 98; scope4x = 92; buttonSize = 50;
    }

    // Hash computation to guarantee model variation unique outputs
    let characterSum = 0;
    for (let i = 0; i < model.length; i++) {
        characterSum += model.charCodeAt(i);
    }
    let hardwareVariance = (characterSum % 6) - 3; // range shift adjustments (-3 to +3)

    general = Math.max(90, Math.min(200, general + hardwareVariance));
    redDot = Math.max(50, Math.min(100, redDot + Math.round(hardwareVariance / 2)));
    scope2x = Math.max(75, Math.min(150, scope2x + hardwareVariance));
    scope4x = Math.max(75, Math.min(150, scope4x + hardwareVariance));

    if (activeDpiMode === 'CON DPI') {
        buttonSize = Math.max(41, buttonSize - 2);
        if (brand === 'Samsung') finalDpi = (420 + (characterSum % 40));
        else if (brand === 'Xiaomi') finalDpi = (460 + (characterSum % 45));
        else if (brand === 'Infinix' || brand === 'Tecno') finalDpi = (510 + (characterSum % 35));
        else if (brand === 'Apple') {
            finalDpi = "Standard (iOS optimization active)";
            general = Math.round(general * 0.78);
        } else finalDpi = (440 + (characterSum % 40));
    } else {
        finalDpi = "Standard";
        general = Math.round(general * 0.84);
        buttonSize = Math.max(46, buttonSize + 2);
    }

    // Build precisely customized formatting layout template matching your layout request
    const layoutOutputText = 
        `For ff sensei\n` +
        `General: ${general}%\n` +
        `red dot: ${redDot}%\n` +
        `2x Scope: ${scope2x}%\n` +
        `4x Scope: ${scope4x}%\n` +
        `button size: ${buttonSize}%\n` +
        `dpi: ${finalDpi}`;

    // Update panel display context metrics
    const panel = document.getElementById('outputPanel');
    panel.innerText = layoutOutputText;
    panel.classList.add('visible');
}
</script>

</body>
</html>
