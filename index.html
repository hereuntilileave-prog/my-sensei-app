<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEMWOODS CLONE - ELITE CONFIG GENERATOR V2.0</title>
    <style>
        :root {
            --bg-dark: #070a12;
            --border-neon: #ff2a5f;
            --text-red: #ff2a5f;
            --text-blue: #00d2ff;
            --text-white: #ffffff;
            --panel-bg: rgba(13, 20, 35, 0.85);
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(0deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.4));
        }
        .app-container {
            width: 100%;
            max-width: 440px;
            border: 2px solid var(--border-neon);
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(255, 42, 95, 0.4);
            box-sizing: border-box;
        }
        .main-title {
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            color: var(--text-white);
            letter-spacing: 3px;
            margin: 0;
            font-family: 'Impact', sans-serif;
            text-shadow: 0 0 10px var(--text-red);
        }
        .sub-title {
            text-align: center;
            font-size: 11px;
            color: var(--text-red);
            letter-spacing: 2px;
            margin: 5px 0 25px 0;
            font-weight: bold;
        }
        .input-label {
            font-size: 11px;
            color: #8fa0c0;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
            letter-spacing: 1px;
        }
        .field-group {
            margin-bottom: 18px;
        }
        select, input {
            width: 100%;
            padding: 10px;
            background-color: #0b111e;
            border: 1px solid #233354;
            color: var(--text-white);
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            border-radius: 2px;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--text-red);
        }
        .range-toggle-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
            margin-bottom: 25px;
        }
        .range-btn {
            background-color: #0b111e;
            border: 1px solid #233354;
            color: var(--text-white);
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
            transition: all 0.2s;
        }
        .range-btn.active {
            background-color: #b31033;
            border-color: var(--text-red);
            color: white;
            box-shadow: 0 0 8px rgba(255, 42, 95, 0.5);
        }
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-gen {
            padding: 12px 5px;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            color: white;
            border-radius: 2px;
        }
        .btn-con {
            background-color: #ffffff;
            color: #000000;
        }
        .btn-sin {
            background-color: #ff2a5f;
        }
        .output-panel {
            border: 1px dashed rgba(255, 42, 95, 0.5);
            background-color: rgba(5, 8, 15, 0.9);
            padding: 15px;
            border-radius: 2px;
            display: none;
        }
        .output-panel.visible {
            display: block;
        }
        .terminal-row {
            display: flex;
            margin-bottom: 6px;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        .term-label {
            width: 160px;
            color: var(--text-red);
            text-transform: uppercase;
        }
        .term-dots {
            color: var(--text-red);
            margin-right: 8px;
        }
        .term-val {
            color: var(--text-white);
            font-weight: bold;
        }
        .term-val.highlight {
            color: #00ff88;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-title">SYSTEMWOODS</div>
    <div class="sub-title">ELITE CONFIG GENERATOR V2.0</div>

    <div class="field-group">
        <label class="input-label">Select Brand / Marca</label>
        <select id="brandSelect">
            <option value="Samsung">Samsung</option>
            <option value="Apple">Apple / iPhone</option>
            <option value="Xiaomi">Xiaomi / Poco / Redmi</option>
            <option value="Infinix">Infinix</option>
            <option value="Tecno">Tecno</option>
            <option value="Other">Other Brand</option>
        </select>
    </div>

    <div class="field-group">
        <label class="input-label">Enter Model / Modelo</label>
        <input type="text" id="modelInput" placeholder="e.g., A05, S24, Poco X6...">
    </div>

    <label class="input-label">Sight Calibration / Calibración de Mira</label>
    <div class="range-toggle-container">
        <button class="range-btn active" onclick="setRange('HIGH', this)">High / Alta</button>
        <button class="range-btn" onclick="setRange('MEDIUM', this)">Medium / Media</button>
        <button class="range-btn" onclick="setRange('LOW', this)">Low / Baja</button>
    </div>

    <div class="action-buttons">
        <button class="btn-gen btn-con" onclick="generateConfig('CON DPI')">Generate Con DPI</button>
        <button class="btn-gen btn-sin" onclick="generateConfig('SIN DPI')">Generate Sin DPI</button>
    </div>

    <div class="output-panel" id="outputPanel">
        <div class="terminal-row" style="justify-content: center; color: var(--text-red); margin-bottom: 12px; font-weight: bold;">=== SYSTEM WOODS CONFIG ===</div>
        <div class="terminal-row"><span class="term-label">Range</span><span class="term-dots">:</span><span class="term-val" id="out-range">HIGH</span></div>
        <div class="terminal-row"><span class="term-label">Mode</span><span class="term-dots">:</span><span class="term-val" style="color:#ff2a5f;" id="out-mode">CON DPI (CUSTOM)</span></div>
        <div class="terminal-row" style="border-bottom: 1px dashed #233354; margin: 8px 0;"></div>
        <div class="terminal-row"><span class="term-label">Device</span><span class="term-dots">:</span><span class="term-val" id="out-device">A05</span></div>
        <div class="terminal-row"><span class="term-label">System</span><span class="term-dots">:</span><span class="term-val" id="out-system">SAMSUNG</span></div>
        <div class="terminal-row" style="border-bottom: 1px dashed #233354; margin: 8px 0;"></div>
        <div class="terminal-row"><span class="term-label">General</span><span class="term-dots">:</span><span class="term-val" id="out-gen">193%</span></div>
        <div class="terminal-row"><span class="term-label">Red Dot</span><span class="term-dots">:</span><span class="term-val" id="out-red">63%</span></div>
        <div class="terminal-row"><span class="term-label">2x Scope</span><span class="term-dots">:</span><span class="term-val" id="out-2x">126%</span></div>
        <div class="terminal-row"><span class="term-label">4x Scope</span><span class="term-dots">:</span><span class="term-val" id="out-4x">121%</span></div>
        <div class="terminal-row"><span class="term-label">Fire Button</span><span class="term-dots">:</span><span class="term-val" id="out-btn">46%</span></div>
        <div class="terminal-row"><span class="term-label">Target DPI</span><span class="term-dots">:</span><span class="term-val highlight" id="out-dpi">DPI: 450</span></div>
    </div>
</div>

<script>
let currentRange = 'HIGH';

function setRange(rangeValue, element) {
    currentRange = rangeValue;
    const buttons = document.querySelectorAll('.range-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
}

function generateConfig(modeType) {
    const brand = document.getElementById('brandSelect').value;
    const model = document.getElementById('modelInput').value.trim() || "Generic Device";
    
    // Core foundational math engine mimicking the pure-red sensitivity metrics
    let baseGen = 95, baseRed = 70, base2x = 85, base4x = 80, fireBtn = 46, finalDpi = "Standard";

    if (currentRange === 'HIGH') {
        baseGen = 193; baseRed = 63; base2x = 126; base4x = 121;
    } else if (currentRange === 'MEDIUM') {
        baseGen = 175; baseRed = 72; base2x = 114; base4x = 108;
    } else {
        baseGen = 150; baseRed = 80; base2x = 98; base4x = 92;
    }

    // Adapt logic variables based on Con DPI vs Sin DPI selections
    if (modeType === 'CON DPI') {
        document.getElementById('out-mode').innerText = "CON DPI (CUSTOM)";
        if (brand === 'Samsung') finalDpi = "DPI: 450";
        else if (brand === 'Xiaomi') finalDpi = "DPI: 490";
        else if (brand === 'Infinix' || brand === 'Tecno') finalDpi = "DPI: 520";
        else finalDpi = "DPI: 411";
        fireBtn = 46;
    } else {
        document.getElementById('out-mode').innerText = "SIN DPI (STANDARD)";
        finalDpi = "Standard (No DPI)";
        baseGen = Math.round(baseGen * 0.85); // Stabilize drag physics
        fireBtn = 50;
    }
