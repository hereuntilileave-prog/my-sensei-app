<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF SENSEI - ELITE CONFIG GENERATOR V2.0</title>
    <style>
        :root {
            --bg-light: #ffffff;
            --card-white: #f8fafc;
            --input-bg: #f1f5f9;
            --accent-red: #ff2a5f;
            --border-color: #cbd5e1;
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 440px;
            border: 2px solid var(--accent-red);
            background-color: var(--card-white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(255, 42, 95, 0.1);
            box-sizing: border-box;
        }
        .main-title {
            text-align: center;
            font-size: 34px;
            font-weight: 900;
            color: var(--text-dark);
            letter-spacing: 2px;
            margin: 0;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }
        .sub-title {
            text-align: center;
            font-size: 11px;
            color: var(--accent-red);
            letter-spacing: 2px;
            margin: 5px 0 25px 0;
            font-weight: bold;
            text-transform: uppercase;
        }
        .input-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .field-group {
            margin-bottom: 18px;
        }
        select, input {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 15px;
            box-sizing: border-box;
            border-radius: 6px;
            transition: border-color 0.2s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-red);
        }
        .range-toggle-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 25px;
        }
        .range-btn {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            padding: 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .range-btn.active {
            background-color: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 42, 95, 0.25);
        }
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        .btn-gen {
            padding: 14px 5px;
            border: 1px solid var(--border-color);
            font-family: inherit;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .btn-con {
            background-color: var(--text-dark);
            color: white;
            border-color: var(--text-dark);
        }
        .btn-sin {
            background-color: var(--input-bg);
            color: var(--text-dark);
        }
        .btn-gen.active-mode {
            border: 2px solid var(--accent-red) !important;
            box-shadow: 0 0 10px rgba(255, 42, 95, 0.3);
        }
        .output-panel {
            border: 2px dashed var(--accent-red);
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .output-panel.visible {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }
        .terminal-row {
            display: flex;
            margin-bottom: 10px;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        .term-label {
            width: 150px;
            color: var(--text-dark);
            font-weight: 600;
        }
        .term-dots {
            color: var(--text-muted);
            margin-right: 12px;
        }
        .term-val {
            color: var(--accent-red);
            font-weight: bold;
        }
        .term-val.highlight {
            color: #0d9488;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-title">FF SENSEI</div>
    <div class="sub-title">ELITE CONFIG GENERATOR V2.0</div>

    <div class="field-group">
        <label class="input-label">Select Brand</label>
        <select id="brandSelect">
            <option value="Samsung">Samsung</option>
            <option value="Apple">Apple / iPhone</option>
            <option value="Xiaomi">Xiaomi / Poco / Redmi</option>
            <option value="Infinix">Infinix</option>
            <option value="Tecno">Tecno</option>
            <option value="Other">Other Brand</option>
        </select>
    </div>

    <div class="field-group">
        <label class="input-label">Enter Model</label>
        <input type="text" id="modelInput" placeholder="e.g., A05, S24, Poco X6...">
    </div>

    <label class="input-label">Sight Calibration</label>
    <div class="range-toggle-container">
        <button type="button" class="range-btn active" id="btn-high" onclick="setRange('HIGH')">Alta</button>
        <button type="button" class="range-btn" id="btn-medium" onclick="setRange('MEDIUM')">Media</button>
        <button type="button" class="range-btn" id="btn-low" onclick="setRange('LOW')">Baja</button>
    </div>

    <label class="input-label">DPI Profiler</label>
    <div class="action-buttons">
        <button type="button" class="btn-gen btn-con" id="btn-con-mode" onclick="generateConfig('CON DPI')">Con DPI</button>
        <button type="button" class="btn-gen btn-sin" id="btn-sin-mode" onclick="generateConfig('SIN DPI')">Sin DPI</button>
    </div>

    <div class="output-panel" id="outputPanel">
        <div class="terminal-row" style="justify-content: center; color: var(--text-dark); margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">=== SENSEI PROFILE CONFIG ===</div>
        <div class="terminal-row"><span class="term-label">General</span><span class="term-dots">:</span><span class="term-val" id="out-gen">0%</span></div>
        <div class="terminal-row"><span class="term-label">Red Dot</span><span class="term-dots">:</span><span class="term-val" id="out-red">0%</span></div>
        <div class="terminal-row"><span class="term-label">2x Scope</span><span class="term-dots">:</span><span class="term-val" id="out-2x">0%</span></div>
        <div class="terminal-row"><span class="term-label">4x Scope</span><span class="term-dots">:</span><span class="term-val" id="out-4x">0%</span></div>
        <div class="terminal-row"><span class="term-label">Button Size</span><span class="term-dots">:</span><span class="term-val" id="out-btn">0%</span></div>
        <div class="terminal-row"><span class="term-label">Dpi</span><span class="term-dots">:</span><span class="term-val highlight" id="out-dpi">Standard</span></div>
    </div>
</div>

<script>
let selectedRange = 'HIGH';

function setRange(rangeValue) {
    selectedRange = rangeValue;
    
    // Clear active status from all range elements
    document.getElementById('btn-high').classList.remove('active');
    document.getElementById('btn-medium').classList.remove('active');
    document.getElementById('btn-low').classList.remove('active');
    
    // Assign active status to target element
    if (rangeValue === 'HIGH') document.getElementById('btn-high').classList.add('active');
    else if (rangeValue === 'MEDIUM') document.getElementById('btn-medium').classList.add('active');
    else if (rangeValue === 'LOW') document.getElementById('btn-low').classList.add('active');
}

function generateConfig(modeType) {
    const brand = document.getElementById('brandSelect').value;
    const model = document.getElementById('modelInput').value.trim().toUpperCase() || "GENERIC";
    
    // Manage active styles for mode buttons
    document.getElementById('btn-con-mode').classList.remove('active-mode');
    document.getElementById('btn-sin-mode').classList.remove('active-mode');
    if(modeType === 'CON DPI') document.getElementById('btn-con-mode').classList.add('active-mode');
    else document.getElementById('btn-sin-mode').classList.add('active-mode');

    // Advanced mathematical parameters to eliminate vertical camera friction
    let genSens = 98, redDot = 85, scope2x = 90, scope4x = 88, buttonSize = 46, calculatedDpi = "Standard";

    // Step 1: Base Tier Scaling via Range Selections
    if (selectedRange === 'HIGH') {
        genSens = 195; redDot = 92; scope2x = 128; scope4x = 124; buttonSize = 44;
    } else if (selectedRange === 'MEDIUM') {
