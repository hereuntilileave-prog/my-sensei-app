<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF SENSEI - ELITE CONFIG GENERATOR V2.0</title>
    <style>
        :root {
            --bg-light: #ffffff;
            --card-white: #f8fafc;
            --input-bg: #f1f5f9;
            --accent-red: #ff2a5f;
            --border-color: #cbd5e1;
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 440px;
            border: 2px solid var(--accent-red);
            background-color: var(--card-white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(255, 42, 95, 0.1);
            box-sizing: border-box;
        }
        .main-title {
            text-align: center;
            font-size: 34px;
            font-weight: 900;
            color: var(--text-dark);
            letter-spacing: 2px;
            margin: 0;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }
        .sub-title {
            text-align: center;
            font-size: 11px;
            color: var(--accent-red);
            letter-spacing: 2px;
            margin: 5px 0 25px 0;
            font-weight: bold;
            text-transform: uppercase;
        }
        .input-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .field-group {
            margin-bottom: 18px;
        }
        select, input {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 15px;
            box-sizing: border-box;
            border-radius: 6px;
        }
        .toggle-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }
        .dpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 25px;
        }
        .btn-option {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            padding: 12px 5px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
            border-radius: 6px;
            text-align: center;
        }
        .btn-option.active {
            background-color: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 42, 95, 0.25);
        }
        .btn-action-trigger {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
        }
        .btn-action-trigger:active {
            background: #ff2a5f;
        }
        .output-panel {
            border: 2px dashed var(--accent-red);
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        .output-panel.visible {
            display: block;
        }
        .terminal-row {
            display: flex;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .term-label {
            width: 150px;
            color: var(--text-dark);
            font-weight: 600;
        }
        .term-dots {
            color: var(--text-muted);
            margin-right: 12px;
        }
        .term-val {
            color: var(--accent-red);
            font-weight: bold;
        }
        .term-val.highlight {
            color: #0d9488;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-title">FF SENSEI</div>
    <div class="sub-title">ELITE CONFIG GENERATOR V2.0</div>

    <div class="field-group">
        <label class="input-label">Select Brand</label>
        <select id="brandSelect">
            <option value="Samsung">Samsung</option>
            <option value="Apple">Apple / iPhone</option>
            <option value="Xiaomi">Xiaomi / Poco / Redmi</option>
            <option value="Infinix">Infinix</option>
            <option value="Tecno">Tecno</option>
            <option value="Other">Other Brand</option>
        </select>
    </div>

    <div class="field-group">
        <label class="input-label">Enter Model</label>
        <input type="text" id="modelInput" placeholder="e.g., A05, S24, Poco X6...">
    </div>

    <label class="input-label">Sight Calibration</label>
    <div class="toggle-grid">
        <div class="btn-option active" id="opt-high" onclick="selectRange('HIGH')">Alta</div>
        <div class="btn-option" id="opt-medium" onclick="selectRange('MEDIUM')">Media</div>
        <div class="btn-option" id="opt-low" onclick="selectRange('LOW')">Baja</div>
    </div>

    <label class="input-label">DPI Profiler</label>
    <div class="dpi-grid">
        <div class="btn-option active" id="opt-con" onclick="selectDpiMode('CON DPI')">Con DPI</div>
        <div class="btn-option" id="opt-sin" onclick="selectDpiMode('SIN DPI')">Sin DPI</div>
    </div>

    <!-- NEW DEDICATED GENERATOR TRIGGER BUTTON -->
    <button type="button" class="btn-action-trigger" onclick="processAiCalibration()">Generate AI Config</button>

    <div class="output-panel" id="outputPanel">
        <div class="terminal-row" style="justify-content: center; color: var(--text-dark); margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">=== SENSEI PROFILE CONFIG ===</div>
        <div class="terminal-row"><span class="term-label">General</span><span class="term-dots">:</span><span class="term-val" id="out-gen">-</span></div>
        <div class="terminal-row"><span class="term-label">Red Dot</span><span class="term-dots">:</span><span class="term-val" id="out-red">-</span></div>
        <div class="terminal-row"><span class="term-label">2x Scope</span><span class="term-dots">:</span><span class="term-val" id="out-2x">-</span></div>
        <div class="terminal-row"><span class="term-label">4x Scope</span><span class="term-dots">:</span><span class="term-val" id="out-4x">-</span></div>
        <div class="terminal-row"><span class="term-label">Button Size</span><span class="term-dots">:</span><span class="term-val" id="out-btn">-</span></div>
        <div class="terminal-row"><span class="term-label">Dpi</span><span class="term-dots">:</span><span class="term-val highlight" id="out-dpi">-</span></div>
    </div>
</div>

<script>
// Track configuration states independently
let globalRange = 'HIGH';
let globalDpiMode = 'CON DPI';

function selectRange(rangeValue) {
    globalRange = rangeValue;
    document.getElementById('opt-high').classList.remove('active');
    document.getElementById('opt-medium').classList.remove('active');
    document.getElementById('opt-low').classList.remove('active');
    
    if (rangeValue === 'HIGH') document.getElementById('opt-high').classList.add('active');
    else if (rangeValue === 'MEDIUM') document.getElementById('opt-medium').classList.add('active');
    else if (rangeValue === 'LOW') document.getElementById('opt-low').classList.add('active');
}

function selectDpiMode(modeValue) {
    globalDpiMode = modeValue;
    document.getElementById('opt-con').classList.remove('active');
    document.getElementById('opt-sin').classList.remove('active');
    
    if (modeValue === 'CON DPI') document.getElementById('opt-con').classList.add('active');
    else if (modeValue === 'SIN DPI') document.getElementById('opt-sin').classList.add('active');
}

function processAiCalibration() {
    const brand = document.getElementById('brandSelect').value;
    const model = document.getElementById('modelInput').value.trim().toUpperCase() || "GENERIC";

    // Mathematical blueprint to secure accurate tracking dynamics
    let general = 95, redDot = 80, scope2x = 88, scope4x = 84, button = 46, dpiOutput = "Standard";

    // 1. Calibration Profiles Matrices
    if (globalRange === 'HIGH') {
        general = 193; redDot = 63; scope2x = 126; scope4x = 121; button = 44;
    } else if (globalRange === 'MEDIUM') {
        general = 172; redDot = 74; scope2x = 110; scope4x = 104; button = 48;
    } else if (globalRange === 'LOW') {
        general = 145; redDot = 82; scope2x = 95; scope4x = 90; button = 52;
    }

    // 2. Hardware Model Character Hash Processing (Unique dynamic shift for every specific typed model)
    let modelWeight = 0;
    for (let i = 0; i < model.length; i++) {
        modelWeight += model.charCodeAt(i);
    }
    let balanceShift = (modelWeight % 8) - 4; // safely shifts data output points up or down slightly

    general = Math.max(90, Math.min(200, general + balanceShift));
    redDot = Math.max(50, Math.min(100, redDot + Math.round(balanceShift / 2)));
